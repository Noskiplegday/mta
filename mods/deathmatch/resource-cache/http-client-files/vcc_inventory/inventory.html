<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Van Canh City - Inventory</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --red:#c0392b;--red-b:#e74c3c;--red-g:rgba(192,57,43,0.5);
  --red-d:#7b241c;
  --green:#27ae60;--green-b:#2ecc71;--green-g:rgba(39,174,96,0.5);
  --gold:#f39c12;--gold-g:rgba(243,156,18,0.5);
  --dark:#080000;--dark2:rgba(15,0,0,0.92);
  --border:rgba(192,57,43,0.25);
  --border-h:rgba(192,57,43,0.6);
  --text:rgba(255,255,255,0.85);--text-dim:rgba(255,255,255,0.4);
}
body{
  width:100vw;height:100vh;
  background:transparent;
  font-family:'Rajdhani',sans-serif;
  overflow:hidden;color:#fff;
}

/* OVERLAY */
.overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.75);
  backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;
  animation:fadeIn 0.25s ease;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* MAIN WINDOW */
.inv-window{
  width:820px;max-height:580px;
  background:var(--dark2);
  border:1px solid var(--border);
  border-radius:12px;
  display:flex;flex-direction:column;
  box-shadow:0 0 60px rgba(0,0,0,0.9), 0 0 2px var(--red);
  animation:windowIn 0.3s cubic-bezier(0.16,1,0.3,1);
  overflow:hidden;
  position:relative;
}
@keyframes windowIn{from{opacity:0;transform:scale(0.95) translateY(20px)}to{opacity:1;transform:none}}
.inv-window::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--red-b),transparent);
}

/* HEADER */
.inv-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px 12px;
  border-bottom:1px solid var(--border);
  background:rgba(192,57,43,0.05);
  flex-shrink:0;
}
.inv-title{
  font-family:'Cinzel',serif;font-size:18px;font-weight:700;
  letter-spacing:4px;color:var(--red-b);
  display:flex;align-items:center;gap:10px;
}
.inv-title-icon{font-size:20px;}
.inv-player-info{display:flex;align-items:center;gap:20px;}
.inv-stat{text-align:center;}
.inv-stat-val{font-size:16px;font-weight:700;color:var(--red-b);}
.inv-stat-lbl{font-size:10px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;}
.inv-weight{
  display:flex;align-items:center;gap:8px;
  font-size:12px;letter-spacing:1px;color:var(--text-dim);
}
.weight-bar{width:80px;height:4px;background:rgba(255,255,255,0.08);border-radius:2px;}
.weight-fill{height:100%;background:var(--red-b);border-radius:2px;transition:width 0.4s;}
.close-btn{
  width:28px;height:28px;border-radius:50%;
  background:rgba(192,57,43,0.15);border:1px solid var(--border);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:14px;transition:all 0.2s;color:var(--text-dim);
}
.close-btn:hover{background:var(--red-d);border-color:var(--red-b);color:#fff;transform:scale(1.1);}

/* TABS */
.inv-tabs{
  display:flex;gap:2px;padding:10px 16px 0;
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.inv-tab{
  padding:7px 18px;font-size:12px;font-weight:600;letter-spacing:2px;
  text-transform:uppercase;cursor:pointer;
  color:var(--text-dim);border-radius:6px 6px 0 0;
  border:1px solid transparent;border-bottom:none;
  transition:all 0.2s;margin-bottom:-1px;
}
.inv-tab:hover{color:#fff;background:rgba(192,57,43,0.08);}
.inv-tab.active{
  color:var(--red-b);border-color:var(--border);
  background:rgba(192,57,43,0.1);
}

/* BODY */
.inv-body{display:flex;flex:1;overflow:hidden;}

/* GRID */
.inv-grid-area{
  flex:1;padding:16px;overflow-y:auto;
}
.inv-grid-area::-webkit-scrollbar{width:4px;}
.inv-grid-area::-webkit-scrollbar-track{background:rgba(0,0,0,0.2);}
.inv-grid-area::-webkit-scrollbar-thumb{background:var(--red-d);border-radius:2px;}

.inv-category-label{
  font-size:11px;letter-spacing:3px;text-transform:uppercase;
  color:var(--text-dim);margin-bottom:10px;padding-bottom:4px;
  border-bottom:1px solid var(--border);
}

.inv-grid{
  display:grid;
  grid-template-columns:repeat(6, 1fr);
  gap:8px;margin-bottom:20px;
}

/* ITEM SLOT */
.item-slot{
  aspect-ratio:1;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(192,57,43,0.15);
  border-radius:8px;
  cursor:pointer;
  position:relative;overflow:hidden;
  transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;
}
.item-slot:hover{
  background:rgba(192,57,43,0.12);
  border-color:var(--red-b);
  transform:translateY(-4px) scale(1.05);
  box-shadow:0 8px 24px rgba(192,57,43,0.35), 0 0 0 1px rgba(231,76,60,0.3);
  z-index:5;
}
.item-slot:hover .item-icon{transform:scale(1.2);}
.item-slot.empty{cursor:default;opacity:0.3;}
.item-slot.empty:hover{transform:none;box-shadow:none;border-color:rgba(192,57,43,0.15);}
.item-slot.selected{
  background:rgba(39,174,96,0.12);
  border-color:var(--green-b);
  box-shadow:0 0 20px var(--green-g);
}
.item-slot.selected:hover{
  background:rgba(39,174,96,0.18);
  border-color:var(--green-b);
  box-shadow:0 8px 24px var(--green-g);
}

/* Rarity glow */
.item-slot.rare{border-color:rgba(52,152,219,0.4);}
.item-slot.rare:hover{border-color:#3498db;box-shadow:0 8px 24px rgba(52,152,219,0.35);}
.item-slot.epic{border-color:rgba(155,89,182,0.4);}
.item-slot.epic:hover{border-color:#9b59b6;box-shadow:0 8px 24px rgba(155,89,182,0.35);}
.item-slot.legendary{border-color:rgba(243,156,18,0.5);}
.item-slot.legendary:hover{border-color:var(--gold);box-shadow:0 8px 24px var(--gold-g);}

.item-slot::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 60%);
  pointer-events:none;
}

.item-icon{
  font-size:26px;transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  line-height:1;
}
.item-name{
  font-size:9px;letter-spacing:0.5px;text-align:center;
  color:var(--text);font-weight:600;
  padding:0 4px;line-height:1.2;
  text-transform:uppercase;
}
.item-qty{
  position:absolute;bottom:4px;right:5px;
  font-size:10px;font-weight:700;color:var(--gold);
}
.item-new{
  position:absolute;top:4px;right:4px;
  width:6px;height:6px;border-radius:50%;
  background:var(--red-b);
  animation:blink 1s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* DETAIL PANEL */
.inv-detail{
  width:200px;border-left:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;
  background:rgba(0,0,0,0.2);
}
.detail-empty{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;color:var(--text-dim);font-size:12px;letter-spacing:2px;text-transform:uppercase;
}
.detail-empty-icon{font-size:40px;opacity:0.2;}

.detail-content{flex:1;padding:16px;display:flex;flex-direction:column;gap:12px;}
.detail-icon{font-size:48px;text-align:center;margin-bottom:4px;}
.detail-name{
  font-family:'Cinzel',serif;font-size:15px;font-weight:700;
  color:#fff;text-align:center;line-height:1.3;
}
.detail-rarity{
  text-align:center;font-size:10px;letter-spacing:3px;text-transform:uppercase;
  margin-top:2px;
}
.rarity-common{color:var(--text-dim);}
.rarity-rare{color:#3498db;}
.rarity-epic{color:#9b59b6;}
.rarity-legendary{color:var(--gold);}

.detail-divider{height:1px;background:var(--border);}
.detail-desc{
  font-size:12px;color:var(--text-dim);line-height:1.6;
  letter-spacing:0.5px;
}
.detail-stats{display:flex;flex-direction:column;gap:6px;}
.detail-stat{display:flex;justify-content:space-between;align-items:center;}
.detail-stat-k{font-size:11px;color:var(--text-dim);letter-spacing:1px;}
.detail-stat-v{font-size:12px;font-weight:700;color:var(--red-b);}
.detail-qty-row{display:flex;align-items:center;gap:8px;justify-content:center;}
.qty-btn{
  width:26px;height:26px;border-radius:4px;
  background:rgba(192,57,43,0.15);border:1px solid var(--border);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:16px;color:var(--text);transition:all 0.2s;
}
.qty-btn:hover{background:var(--red-d);border-color:var(--red-b);}
.qty-display{
  min-width:36px;text-align:center;
  font-size:15px;font-weight:700;color:#fff;
}

/* ACTION BUTTONS */
.detail-actions{
  padding:12px 16px 14px;border-top:1px solid var(--border);
  display:flex;flex-direction:column;gap:6px;
}
.btn-use{
  padding:9px;border-radius:6px;
  background:linear-gradient(135deg, rgba(39,174,96,0.2), rgba(39,174,96,0.1));
  border:1px solid rgba(39,174,96,0.4);
  color:var(--green-b);cursor:pointer;
  font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;
  transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1);
  text-align:center;
}
.btn-use:hover{
  background:linear-gradient(135deg, rgba(39,174,96,0.35), rgba(39,174,96,0.2));
  border-color:var(--green-b);
  box-shadow:0 0 20px var(--green-g),0 4px 12px rgba(0,0,0,0.3);
  transform:translateY(-2px);
}
.btn-use:active{transform:translateY(0);}

.btn-drop{
  padding:9px;border-radius:6px;
  background:rgba(192,57,43,0.08);
  border:1px solid rgba(192,57,43,0.25);
  color:var(--red-b);cursor:pointer;
  font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;
  transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1);
  text-align:center;
}
.btn-drop:hover{
  background:rgba(192,57,43,0.2);
  border-color:var(--red-b);
  box-shadow:0 0 20px var(--red-g),0 4px 12px rgba(0,0,0,0.3);
  transform:translateY(-2px);
}
.btn-drop:active{transform:translateY(0);}

/* TOAST */
.toast{
  position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);
  background:rgba(10,0,0,0.95);border:1px solid var(--border);
  border-radius:8px;padding:10px 20px;
  font-size:13px;letter-spacing:1px;
  opacity:0;transition:all 0.3s;pointer-events:none;
  z-index:100;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.success{border-color:var(--green-b);color:var(--green-b);}
.toast.error{border-color:var(--red-b);color:var(--red-b);}
</style>
</head>
<body>
<div class="overlay" id="overlay">
  <div class="inv-window">
    <!-- HEADER -->
    <div class="inv-header">
      <div class="inv-title">
        <span class="inv-title-icon">🎒</span>
        INVENTORY
      </div>
      <div class="inv-player-info">
        <div class="inv-stat">
          <div class="inv-stat-val" id="hdr-money">$0</div>
          <div class="inv-stat-lbl">Tiền</div>
        </div>
        <div class="inv-weight">
          <span id="weight-text">0/50 kg</span>
          <div class="weight-bar"><div class="weight-fill" id="weight-fill" style="width:0%"></div></div>
        </div>
      </div>
      <div class="close-btn" onclick="closeInventory()">✕</div>
    </div>

    <!-- TABS -->
    <div class="inv-tabs">
      <div class="inv-tab active" onclick="switchCat('all',this)">Tất Cả</div>
      <div class="inv-tab" onclick="switchCat('food',this)">🍖 Đồ Ăn</div>
      <div class="inv-tab" onclick="switchCat('weapon',this)">⚔ Vũ Khí</div>
      <div class="inv-tab" onclick="switchCat('medical',this)">💊 Y Tế</div>
      <div class="inv-tab" onclick="switchCat('misc',this)">📦 Khác</div>
    </div>

    <!-- BODY -->
    <div class="inv-body">
      <div class="inv-grid-area" id="grid-area">
        <!-- dynamically filled -->
      </div>
      <!-- DETAIL PANEL -->
      <div class="inv-detail">
        <div class="detail-empty" id="detail-empty">
          <div class="detail-empty-icon">🎒</div>
          <div>Chọn vật phẩm</div>
        </div>
        <div class="detail-content" id="detail-content" style="display:none">
          <div class="detail-icon" id="d-icon">🍗</div>
          <div class="detail-name" id="d-name">Gà Rán</div>
          <div class="detail-rarity" id="d-rarity">-</div>
          <div class="detail-divider"></div>
          <div class="detail-desc" id="d-desc">Mô tả vật phẩm.</div>
          <div class="detail-stats" id="d-stats"></div>
          <div class="detail-divider"></div>
          <div class="detail-qty-row">
            <div class="qty-btn" onclick="changeQty(-1)">−</div>
            <div class="qty-display" id="d-qty">1</div>
            <div class="qty-btn" onclick="changeQty(1)">+</div>
          </div>
        </div>
        <div class="detail-actions" id="detail-actions" style="display:none">
          <button class="btn-use" onclick="useItem()">✅ SỬ DỤNG</button>
          <button class="btn-drop" onclick="dropItem()">🗑 VỨT BỎ</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// === DATA ===
let inventory = [];
let selectedSlot = null;
let selectedQty = 1;
let currentCat = 'all';

// Item definitions
const ITEM_DEFS = {
  ga_ran:    {name:"Gà Rán",    icon:"🍗", cat:"food",    rarity:"common",  desc:"Gà rán giòn rụm, hồi phục 30% đói.",     stats:{hunger:"+30%"}},
  banh_mi:   {name:"Bánh Mì",   icon:"🥖", cat:"food",    rarity:"common",  desc:"Bánh mì thơm ngon, hồi phục 20% đói.",   stats:{hunger:"+20%"}},
  nuoc_suoi: {name:"Nước Suối", icon:"💧", cat:"food",    rarity:"common",  desc:"Nước suối mát lạnh, hồi phục 40% khát.", stats:{thirst:"+40%"}},
  nuoc_ngot: {name:"Nước Ngọt", icon:"🥤", cat:"food",    rarity:"common",  desc:"Giải khát nhanh, hồi phục 25% khát.",    stats:{thirst:"+25%"}},
  com_hop:   {name:"Cơm Hộp",   icon:"🍱", cat:"food",    rarity:"common",  desc:"Cơm hộp đầy đặn, hồi 40% đói + 15% khát.",stats:{hunger:"+40%",thirst:"+15%"}},
  thuoc_bong:{name:"Băng Y Tế", icon:"🩹", cat:"medical", rarity:"common",  desc:"Băng bó vết thương, hồi 20 máu.",         stats:{hp:"+20 HP"}},
  kit_cuu_thuong:{name:"Bộ Cứu Thương",icon:"💊",cat:"medical",rarity:"rare",desc:"Bộ cứu thương đầy đủ, hồi 60 máu.",     stats:{hp:"+60 HP"}},
  adrenaline:{name:"Adrenaline",icon:"💉", cat:"medical", rarity:"epic",    desc:"Tiêm adrenaline, tức thì hồi 100 máu.",   stats:{hp:"+100 HP"}},
  dao_kiem:  {name:"Dao Bấm",   icon:"🔪", cat:"weapon",  rarity:"common",  desc:"Dao bấm cơ bản. Sát thương thấp.",        stats:{damage:"15 DMG",range:"Cận chiến"}},
  sung_luc:  {name:"Súng Lục",  icon:"🔫", cat:"weapon",  rarity:"rare",    desc:"Súng lục tiêu chuẩn. 12 viên/clip.",      stats:{damage:"35 DMG",ammo:"12"}},
  ak47:      {name:"AK-47",     icon:"🪃", cat:"weapon",  rarity:"epic",    desc:"Súng trường tấn công. Uy lực cao.",        stats:{damage:"55 DMG",ammo:"30"}},
  golden_gun:{name:"Golden Gun",icon:"⭐",  cat:"weapon",  rarity:"legendary",desc:"Súng vàng huyền thoại. One-shot kill.",  stats:{damage:"999 DMG",ammo:"1"}},
  tui_vi:    {name:"Túi Vải",   icon:"👝", cat:"misc",    rarity:"common",  desc:"Túi vải đơn giản.",                       stats:{weight:"+10 kg"}},
  ban_do:    {name:"Bản Đồ",    icon:"🗺", cat:"misc",    rarity:"rare",    desc:"Bản đồ khu vực Van Canh City.",           stats:{}},
  dien_thoai:{name:"Điện Thoại",icon:"📱", cat:"misc",    rarity:"rare",    desc:"Điện thoại thông minh. Gọi điện, nhắn tin.",stats:{}}
};

function buildInventory(data) {
  inventory = data || [
    {id:"ga_ran",    qty:3},
    {id:"banh_mi",   qty:2},
    {id:"nuoc_suoi", qty:5},
    {id:"nuoc_ngot", qty:1},
    {id:"com_hop",   qty:1},
    {id:"thuoc_bong",qty:4},
    {id:"kit_cuu_thuong",qty:1},
    {id:"dao_kiem",  qty:1},
    {id:"sung_luc",  qty:1},
    {id:"ban_do",    qty:1},
    {id:"dien_thoai",qty:1},
  ];
  renderGrid();
  updateWeight();
}

function renderGrid() {
  const area = document.getElementById('grid-area');
  area.innerHTML = '';
  const filtered = inventory.filter(i => currentCat==='all' || ITEM_DEFS[i.id]?.cat===currentCat);

  if(filtered.length === 0) {
    area.innerHTML = '<div style="color:rgba(255,255,255,0.2);font-size:13px;letter-spacing:2px;text-align:center;padding:40px 0;">Không có vật phẩm</div>';
    return;
  }

  const grid = document.createElement('div');
  grid.className = 'inv-grid';

  filtered.forEach((item, idx) => {
    const def = ITEM_DEFS[item.id] || {name:item.id, icon:'📦', rarity:'common', cat:'misc'};
    const slot = document.createElement('div');
    slot.className = 'item-slot '+def.rarity;
    if(selectedSlot && selectedSlot.id === item.id) slot.classList.add('selected');
    slot.innerHTML = `
      <div class="item-icon">${def.icon}</div>
      <div class="item-name">${def.name}</div>
      ${item.qty > 1 ? `<div class="item-qty">x${item.qty}</div>` : ''}
    `;
    slot.onclick = () => selectItem(item, slot);
    slot.title = def.name;
    grid.appendChild(slot);
  });

  // Fill empty slots up to 24
  const totalSlots = Math.max(filtered.length, 24);
  for(let i = filtered.length; i < totalSlots; i++) {
    const empty = document.createElement('div');
    empty.className = 'item-slot empty';
    grid.appendChild(empty);
  }

  area.appendChild(grid);
}

function selectItem(item, slotEl) {
  selectedSlot = item;
  selectedQty = 1;
  document.querySelectorAll('.item-slot').forEach(s=>s.classList.remove('selected'));
  slotEl.classList.add('selected');

  const def = ITEM_DEFS[item.id] || {name:item.id, icon:'📦', desc:'', rarity:'common', stats:{}};
  document.getElementById('detail-empty').style.display='none';
  document.getElementById('detail-content').style.display='flex';
  document.getElementById('detail-actions').style.display='flex';
  document.getElementById('d-icon').textContent=def.icon;
  document.getElementById('d-name').textContent=def.name;
  const rarityMap={common:'Phổ Thông',rare:'Hiếm',epic:'Sử Thi',legendary:'Huyền Thoại'};
  const rarityEl=document.getElementById('d-rarity');
  rarityEl.textContent=rarityMap[def.rarity]||def.rarity;
  rarityEl.className='detail-rarity rarity-'+def.rarity;
  document.getElementById('d-desc').textContent=def.desc||'';
  document.getElementById('d-qty').textContent=1;

  const statsEl=document.getElementById('d-stats');
  statsEl.innerHTML='';
  if(def.stats) {
    Object.entries(def.stats).forEach(([k,v])=>{
      const labels={hunger:'Đói',thirst:'Khát',hp:'Máu',damage:'Sát Thương',ammo:'Đạn',range:'Tầm',weight:'Trọng Lượng'};
      statsEl.innerHTML+=`<div class="detail-stat"><span class="detail-stat-k">${labels[k]||k}</span><span class="detail-stat-v">${v}</span></div>`;
    });
  }
}

function changeQty(delta) {
  if(!selectedSlot) return;
  const item = inventory.find(i=>i.id===selectedSlot.id);
  if(!item) return;
  selectedQty = Math.max(1, Math.min(item.qty, selectedQty + delta));
  document.getElementById('d-qty').textContent = selectedQty;
}

function useItem() {
  if(!selectedSlot) return;
  if(window.mta) mta.triggerEvent('onInventoryUse', selectedSlot.id, selectedQty);
  showToast('✅ Đã sử dụng: '+(ITEM_DEFS[selectedSlot.id]?.name||selectedSlot.id), 'success');
}

function dropItem() {
  if(!selectedSlot) return;
  if(window.mta) mta.triggerEvent('onInventoryDrop', selectedSlot.id, selectedQty);
  showToast('🗑 Đã vứt bỏ: '+(ITEM_DEFS[selectedSlot.id]?.name||selectedSlot.id), 'error');
  // Remove from local display
  const idx = inventory.findIndex(i=>i.id===selectedSlot.id);
  if(idx>-1) {
    inventory[idx].qty -= selectedQty;
    if(inventory[idx].qty <= 0) inventory.splice(idx, 1);
  }
  selectedSlot = null;
  document.getElementById('detail-empty').style.display='flex';
  document.getElementById('detail-content').style.display='none';
  document.getElementById('detail-actions').style.display='none';
  renderGrid();
  updateWeight();
}

function updateWeight() {
  let total = inventory.reduce((s,i)=>s+i.qty*0.5,0);
  const max=50;
  document.getElementById('weight-text').textContent=total.toFixed(1)+'/'+max+' kg';
  document.getElementById('weight-fill').style.width=Math.min(100,(total/max*100))+'%';
}

function switchCat(cat, tab) {
  currentCat = cat;
  document.querySelectorAll('.inv-tab').forEach(t=>t.classList.remove('active'));
  tab.classList.add('active');
  selectedSlot = null;
  document.getElementById('detail-empty').style.display='flex';
  document.getElementById('detail-content').style.display='none';
  document.getElementById('detail-actions').style.display='none';
  renderGrid();
}

function closeInventory() {
  if(window.mta) mta.triggerEvent('onInventoryClose');
  document.getElementById('overlay').style.animation='none';
  document.getElementById('overlay').style.opacity='0';
  document.getElementById('overlay').style.transition='opacity 0.2s';
}

function showToast(msg, type='success') {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast '+type+' show';
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>t.classList.remove('show'), 2500);
}

// Called from Lua: setInventory(jsonArray)
function setInventory(items) { buildInventory(items); }
function setMoney(m){ document.getElementById('hdr-money').textContent='$'+m.toLocaleString(); }
function addItemEffect(id){ showToast('🎁 Nhận được: '+(ITEM_DEFS[id]?.name||id),'success'); }
function removeItemResult(id, success) {
  if(success) renderGrid();
  else showToast('❌ Không thể sử dụng!','error');
}

// Init
buildInventory();
</script>
