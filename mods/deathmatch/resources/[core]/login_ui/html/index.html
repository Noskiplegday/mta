<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Van Canh City - Login</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --red: #c0392b;
  --red-bright: #e74c3c;
  --red-dark: #7b241c;
  --red-glow: rgba(192,57,43,0.6);
  --green: #27ae60;
  --green-bright: #2ecc71;
  --green-glow: rgba(39,174,96,0.6);
  --gold: #f39c12;
  --dark: #0a0a0a;
  --dark2: #111111;
  --dark3: #1a0a0a;
  --glass: rgba(10,0,0,0.75);
  --border: rgba(192,57,43,0.3);
}

body {
  width: 100vw; height: 100vh;
  background: var(--dark);
  font-family: 'Rajdhani', sans-serif;
  overflow: hidden;
  color: #fff;
}

/* BACKGROUND */
.bg {
  position: fixed; inset: 0;
  background: 
    radial-gradient(ellipse at 20% 50%, rgba(120,20,10,0.4) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 50%, rgba(80,10,10,0.3) 0%, transparent 60%),
    radial-gradient(ellipse at 50% 100%, rgba(150,30,10,0.2) 0%, transparent 50%),
    linear-gradient(180deg, #0a0000 0%, #110000 50%, #0a0000 100%);
}

.bg-grid {
  position: fixed; inset: 0;
  background-image: 
    linear-gradient(rgba(192,57,43,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(192,57,43,0.04) 1px, transparent 1px);
  background-size: 50px 50px;
  animation: gridMove 20s linear infinite;
}
@keyframes gridMove { from{background-position:0 0} to{background-position:50px 50px} }

.bg-particles { position:fixed; inset:0; pointer-events:none; }
.particle {
  position:absolute; width:2px; height:2px;
  background: var(--red-bright); border-radius:50%;
  animation: float linear infinite;
  opacity:0;
}
@keyframes float {
  0%{opacity:0;transform:translateY(100vh) translateX(0)}
  10%{opacity:1}
  90%{opacity:1}
  100%{opacity:0;transform:translateY(-100px) translateX(calc(var(--drift)*1px))}
}

/* DECORATIVE LINES */
.deco-line-left, .deco-line-right {
  position:fixed; top:0; bottom:0; width:1px;
  background: linear-gradient(180deg, transparent, var(--red), var(--red-bright), var(--red), transparent);
  opacity:0.5;
  animation: lineGlow 3s ease-in-out infinite alternate;
}
.deco-line-left { left: 10%; }
.deco-line-right { right: 10%; animation-delay:1.5s; }
@keyframes lineGlow { from{opacity:0.2} to{opacity:0.7} }

/* MAIN CONTAINER */
.main {
  position: relative; z-index:10;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 100vh; gap: 0;
}

/* LOGO */
.logo-wrap {
  text-align: center; margin-bottom: 30px;
  animation: logoIn 1s cubic-bezier(0.16,1,0.3,1) both;
}
@keyframes logoIn {
  from{opacity:0;transform:translateY(-40px) scale(0.8)}
  to{opacity:1;transform:translateY(0) scale(1)}
}

.logo-icon {
  width: 80px; height: 80px; margin: 0 auto 12px;
  border: 2px solid var(--red);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 36px;
  box-shadow: 0 0 30px var(--red-glow), inset 0 0 20px rgba(192,57,43,0.1);
  animation: iconPulse 2.5s ease-in-out infinite;
  position: relative;
}
.logo-icon::before {
  content:'';position:absolute;inset:-4px;
  border-radius:50%; border:1px solid rgba(192,57,43,0.3);
  animation: rotateBorder 8s linear infinite;
}
.logo-icon::after {
  content:'';position:absolute;inset:-8px;
  border-radius:50%; border:1px dashed rgba(192,57,43,0.15);
  animation: rotateBorder 12s linear infinite reverse;
}
@keyframes iconPulse {
  0%,100%{box-shadow:0 0 30px var(--red-glow),inset 0 0 20px rgba(192,57,43,0.1)}
  50%{box-shadow:0 0 60px var(--red-glow),0 0 100px rgba(192,57,43,0.2),inset 0 0 30px rgba(192,57,43,0.2)}
}
@keyframes rotateBorder { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

.logo-title {
  font-family: 'Cinzel', serif;
  font-size: 38px; font-weight: 900;
  letter-spacing: 6px;
  background: linear-gradient(135deg, #fff 0%, var(--red-bright) 50%, var(--gold) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  text-shadow: none;
  line-height:1;
}
.logo-sub {
  font-size: 13px; letter-spacing: 8px;
  color: var(--red); text-transform: uppercase;
  margin-top: 6px; opacity: 0.8;
}

/* PANEL */
.panel {
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 36px 40px;
  width: 380px;
  backdrop-filter: blur(20px);
  box-shadow: 0 0 40px rgba(0,0,0,0.8), 0 0 1px var(--red) inset;
  animation: panelIn 1s 0.3s cubic-bezier(0.16,1,0.3,1) both;
  position: relative;
  overflow: hidden;
}
@keyframes panelIn {
  from{opacity:0;transform:scale(0.9) translateY(20px)}
  to{opacity:1;transform:scale(1) translateY(0)}
}
.panel::before {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background: linear-gradient(90deg, transparent, var(--red-bright), transparent);
}
.panel::after {
  content:''; position:absolute; bottom:0; left:0; right:0; height:1px;
  background: linear-gradient(90deg, transparent, var(--red), transparent);
}

.tab-bar {
  display: flex; margin-bottom: 28px;
  border-bottom: 1px solid var(--border);
}
.tab {
  flex:1; padding:10px; text-align:center;
  font-size:14px; font-weight:600; letter-spacing:2px; text-transform:uppercase;
  cursor:pointer; color: rgba(255,255,255,0.4);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: all 0.3s;
}
.tab.active { color: var(--red-bright); border-bottom-color: var(--red-bright); }
.tab:hover:not(.active) { color: rgba(255,255,255,0.7); }

.form-group { margin-bottom: 18px; position: relative; }
.form-group label {
  display: block; font-size:12px; font-weight:600;
  letter-spacing: 2px; text-transform: uppercase;
  color: var(--red); margin-bottom: 8px;
}
.form-group input {
  width: 100%; padding: 12px 16px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(192,57,43,0.25);
  border-radius: 6px;
  color: #fff; font-family:'Rajdhani',sans-serif; font-size:15px;
  outline: none;
  transition: all 0.3s;
}
.form-group input:focus {
  border-color: var(--red-bright);
  background: rgba(192,57,43,0.07);
  box-shadow: 0 0 15px rgba(192,57,43,0.2);
}
.form-group input::placeholder { color: rgba(255,255,255,0.25); }

.form-icon {
  position: absolute; right:14px; top:39px;
  color: rgba(192,57,43,0.5); font-size:16px;
}

.btn-login {
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, var(--red-dark), var(--red));
  border: 1px solid var(--red-bright);
  border-radius: 6px;
  color: #fff; font-family:'Rajdhani',sans-serif;
  font-size:16px; font-weight:700; letter-spacing:3px; text-transform:uppercase;
  cursor: pointer; position:relative; overflow:hidden;
  transition: all 0.3s; margin-top:8px;
}
.btn-login::before {
  content:''; position:absolute; inset:0;
  background: linear-gradient(135deg, var(--red), var(--red-bright));
  opacity:0; transition:opacity 0.3s;
}
.btn-login:hover { box-shadow: 0 0 30px var(--red-glow); transform:translateY(-1px); }
.btn-login:hover::before { opacity:1; }
.btn-login:active { transform:translateY(0); }
.btn-login span { position:relative; z-index:1; }

.btn-register {
  width:100%; padding:12px;
  background: transparent;
  border: 1px solid rgba(39,174,96,0.4);
  border-radius:6px; color: var(--green-bright);
  font-family:'Rajdhani',sans-serif; font-size:15px; font-weight:600;
  letter-spacing:2px; text-transform:uppercase;
  cursor:pointer; transition:all 0.3s; margin-top:10px;
}
.btn-register:hover {
  background: rgba(39,174,96,0.1);
  border-color: var(--green-bright);
  box-shadow: 0 0 20px var(--green-glow);
}

.divider {
  display:flex; align-items:center; gap:12px; margin:16px 0;
  color:rgba(255,255,255,0.2); font-size:12px; letter-spacing:2px;
}
.divider::before,.divider::after {
  content:''; flex:1; height:1px;
  background: rgba(192,57,43,0.2);
}

.status-msg {
  text-align:center; font-size:13px; letter-spacing:1px;
  padding:8px; border-radius:4px; margin-top:12px;
  display:none;
}
.status-msg.error { display:block; color:var(--red-bright); background:rgba(192,57,43,0.1); border:1px solid rgba(192,57,43,0.3); }
.status-msg.success { display:block; color:var(--green-bright); background:rgba(39,174,96,0.1); border:1px solid rgba(39,174,96,0.3); }

/* TAB PANELS */
.tab-panel { display:none; }
.tab-panel.active { display:block; animation: fadeSlide 0.3s ease; }
@keyframes fadeSlide { from{opacity:0;transform:translateX(10px)} to{opacity:1;transform:translateX(0)} }

/* FOOTER */
.footer {
  position:fixed; bottom:16px;
  color:rgba(255,255,255,0.2); font-size:11px; letter-spacing:3px;
  text-transform:uppercase;
  animation: fadeIn 1s 1s both;
}
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

/* CORNER DECO */
.corner { position:fixed; width:40px; height:40px; }
.corner::before,.corner::after { content:''; position:absolute; background:var(--red-bright); }
.corner::before { width:100%; height:1px; top:0; left:0; }
.corner::after { width:1px; height:100%; top:0; left:0; }
.corner.tl { top:20px; left:20px; }
.corner.tr { top:20px; right:20px; transform:scaleX(-1); }
.corner.bl { bottom:20px; left:20px; transform:scaleY(-1); }
.corner.br { bottom:20px; right:20px; transform:scale(-1); }

/* Loading overlay */
.loading-overlay {
  position:fixed; inset:0; z-index:100;
  background: var(--dark); display:flex; align-items:center; justify-content:center;
  flex-direction:column; gap:20px;
  animation: fadeOut 0.5s 0.5s forwards;
}
@keyframes fadeOut { to{opacity:0;pointer-events:none} }
.loading-bar-wrap {
  width:200px; height:2px; background:rgba(255,255,255,0.05);
  border-radius:2px; overflow:hidden;
}
.loading-bar-inner {
  height:100%; width:0; background:var(--red-bright);
  border-radius:2px;
  animation: loadBar 0.5s 0s forwards;
}
@keyframes loadBar { to{width:100%} }
.loading-text { font-size:12px; letter-spacing:4px; color:var(--red); text-transform:uppercase; }
</style>
</head>
<body>

<div class="loading-overlay">
  <div class="loading-text">Van Canh City</div>
  <div class="loading-bar-wrap"><div class="loading-bar-inner"></div></div>
</div>

<div class="bg"></div>
<div class="bg-grid"></div>
<div class="bg-particles" id="particles"></div>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>
<div class="deco-line-left"></div>
<div class="deco-line-right"></div>

<div class="main">
  <div class="logo-wrap">
    <div class="logo-icon">⚔</div>
    <div class="logo-title">VAN CANH</div>
    <div class="logo-sub">City Roleplay · MTA:SA</div>
  </div>

  <div class="panel">
    <div class="tab-bar">
      <div class="tab active" onclick="switchTab('login')">Đăng Nhập</div>
      <div class="tab" onclick="switchTab('register')">Đăng Ký</div>
    </div>

    <!-- LOGIN -->
    <div class="tab-panel active" id="tab-login">
      <div class="form-group">
        <label>Tên tài khoản</label>
        <input type="text" id="login-user" placeholder="Nhập username..." autocomplete="off"/>
        <span class="form-icon">👤</span>
      </div>
      <div class="form-group">
        <label>Mật khẩu</label>
        <input type="password" id="login-pass" placeholder="Nhập mật khẩu..."/>
        <span class="form-icon">🔒</span>
      </div>
      <button class="btn-login" onclick="doLogin()"><span>⚡ ĐĂNG NHẬP</span></button>
      <div class="status-msg" id="login-msg"></div>
    </div>

    <!-- REGISTER -->
    <div class="tab-panel" id="tab-register">
      <div class="form-group">
        <label>Tên tài khoản</label>
        <input type="text" id="reg-user" placeholder="Nhập username..." autocomplete="off"/>
        <span class="form-icon">👤</span>
      </div>
      <div class="form-group">
        <label>Mật khẩu</label>
        <input type="password" id="reg-pass" placeholder="Nhập mật khẩu..."/>
        <span class="form-icon">🔒</span>
      </div>
      <div class="form-group">
        <label>Xác nhận mật khẩu</label>
        <input type="password" id="reg-pass2" placeholder="Nhập lại mật khẩu..."/>
        <span class="form-icon">🔑</span>
      </div>
      <button class="btn-register" onclick="doRegister()">✨ TẠO TÀI KHOẢN</button>
      <div class="status-msg" id="reg-msg"></div>
    </div>
  </div>
</div>

<div class="footer">Van Canh City © 2025 · All Rights Reserved</div>

<script>
// Generate particles
const pc = document.getElementById('particles');
for(let i=0;i<30;i++){
  const p=document.createElement('div');
  p.className='particle';
  p.style.left=Math.random()*100+'%';
  p.style.setProperty('--drift',(Math.random()-0.5)*200);
  p.style.animationDuration=(8+Math.random()*15)+'s';
  p.style.animationDelay=Math.random()*10+'s';
  p.style.width=p.style.height=(1+Math.random()*2)+'px';
  pc.appendChild(p);
}

function switchTab(t) {
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active', (i===0&&t==='login')||(i===1&&t==='register')));
  document.querySelectorAll('.tab-panel').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
}

function showMsg(id, msg, type) {
  const el=document.getElementById(id);
  el.textContent=msg; el.className='status-msg '+type;
}

function doLogin() {
  const user = document.getElementById('login-user').value.trim();
  const pass = document.getElementById('login-pass').value;
  if(!user || !pass){ showMsg('login-msg', 'Vui lòng điền đủ thông tin!', 'error'); return; }
  
  if(window.mta) {
      mta.triggerEvent('onLoginSubmit', user, pass); // Tên phải là onLoginSubmit
  }
}

function doRegister() {
  const user = document.getElementById('reg-user').value.trim();
  const pass = document.getElementById('reg-pass').value;
  // ... các đoạn kiểm tra khác ...
  
  // DÒNG NÀY PHẢI LÀ 'onRegisterSubmit'
  if(window.mta) {
    mta.triggerEvent('onRegisterSubmit', user, pass);
  } else {
    showMsg('reg-msg', 'Đang kết nối game...', 'error');
  }
}

// Receive events from Lua
function showLoginError(msg){ showMsg('login-msg',msg,'error'); }
function showLoginSuccess(msg){ showMsg('login-msg',msg,'success'); }
function showRegError(msg){ showMsg('reg-msg',msg,'error'); }
function showRegSuccess(msg){ showMsg('reg-msg',msg,'success'); }

// Enter key support
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    if(document.getElementById('tab-login').classList.contains('active')) doLogin();
    else doRegister();
  }
// Thay thế đoạn script xử lý ở cuối file index.html của bạn bằng đoạn này:

function toggleView(type) {
  document.getElementById('login-view').classList.toggle('active', type==='login');
  document.getElementById('reg-view').classList.toggle('active', type==='register');
}

function doLogin() {
  const user = document.getElementById('login-user').value.trim();
  const pass = document.getElementById('login-pass').value;
  
  if(!user || !pass){
    showMsg('login-msg', 'Vui lòng điền đầy đủ thông tin!', 'error');
    return;
  }
  
  // Gửi sự kiện về Client của MTA (Đã đồng bộ tên Event)
  if(window.mta) {
    mta.triggerEvent('onCefLoginSubmit', user, pass);
  } else {
    showMsg('login-msg', 'Đang kết nối tương tác game...', 'error');
  }
}

function doRegister() {
  const user = document.getElementById('reg-user').value.trim();
  const pass = document.getElementById('reg-pass').value;
  const pass2 = document.getElementById('reg-pass2').value;
  
  // Tạo mặc định Email và Tên nhân vật ảo dựa theo tên tài khoản để khớp với Server MySQL cũ của bạn
  const email = user + "@vancanh.com";
  const char = user + "_City"; 

  if(!user || !pass || !pass2){
    showMsg('reg-msg', 'Vui lòng điền đầy đủ thông tin!', 'error');
    return;
  }
  if(pass.length < 6){
    showMsg('reg-msg', 'Mật khẩu phải có ít nhất 6 ký tự!', 'error');
    return;
  }
  if(pass !== pass2){
    showMsg('reg-msg', 'Mật khẩu xác nhận không khớp!', 'error');
    return;
  }
  
  // Gửi sự kiện về Client của MTA (Đã đồng bộ tên Event)
  if(window.mta) {
    mta.triggerEvent('onCefRegisterSubmit', user, pass, email, char);
  } else {
    showMsg('reg-msg', 'Đang kết nối tương tác game...', 'error');
  }
}

// Các hàm nhận phản hồi từ file Lua gửi lên Web để in chữ thông báo lỗi/thành công
function showResponse(text, isSuccess) {
  if (isSuccess) {
    // Nếu Đăng ký thành công, hiển thị thông báo xanh và tự chuyển về tab Đăng Nhập
    showMsg('reg-msg', text, 'success');
    showMsg('login-msg', 'Đăng ký thành công! Hãy Đăng nhập.', 'success');
    setTimeout(() => { toggleView('login'); }, 2000);
  } else {
    // Nếu thất bại thì in lỗi đỏ lòm lên tab tương ứng
    showMsg('login-msg', text, 'error');
    showMsg('reg-msg', text, 'error');
  }
}
});
</script>
</body>
</html>
